# Service
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop

  labels:
    component: user
    project: roboshop
    tier: application

spec:

  selector:
    component: user
    project: roboshop
    tier: application

  ports:
  - protocol: TCP
    port: 8080
    targetPort: {{ .Values.deployment.targetPort}} #8080
