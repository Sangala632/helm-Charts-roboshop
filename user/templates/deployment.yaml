# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: roboshop
  # deployment labels
  labels:
    component: user
    project: roboshop
    tier: application

spec:
  replicas: {{ .Values.deployment.replicas }}
  # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      component: user
      project: roboshop
      tier: application
  # This is pod definition
  template:
    metadata:
      labels:
        component: user
        project: roboshop
        tier: application

    spec:
      containers:
      - name: user
        image: "{{ .Values.deployment.image }}:{{ .Values.deployment.imageVersion }}" #sangala2025/user:v1
        resources:
          requests:
            cpu: "50m"
            memory: "120Mi"

          limits:
            cpu: "100m"
            memory: "256Mi"

        envFrom:
        - configMapRef:
            name: user

