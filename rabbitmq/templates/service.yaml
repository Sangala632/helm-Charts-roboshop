# mysql service (cluster internal)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    component: rabbitmq
    project: roboshop
    tier: database

spec:
  selector:
    component: rabbitmq
    project: roboshop
    tier: database

  ports:
  - protocol: TCP
    port: 3306
    targetPort: {{ .Values.service.targetPort }}

