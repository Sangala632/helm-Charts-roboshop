# Service
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop

  labels:
    component: payment
    project: roboshop
    tier: application

spec:

  selector:
    component: payment
    project: roboshop
    tier: application

  ports:
  - protocol: TCP
    port: 8080 # service port
    targetPort: {{ .Values.deployment.targetPort}} #8080  container port
