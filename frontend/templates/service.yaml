# Service
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: roboshop

  labels:
    component: frontend
    project: roboshop
    tier: application

spec:
  type: LoadBalancer
  selector:
    component: frontend
    project: roboshop
    tier: application

  ports:
  - protocol: TCP
    port: 80
    targetPort: {{ .Values.deployment.targetPort}} #8080
