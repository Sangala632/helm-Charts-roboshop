# Service
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop

  labels:
    component: cart
    project: roboshop
    tier: application

spec:

  selector:
    component: cart
    project: roboshop
    tier: application

  ports:
  - protocol: TCP
    port: 8080 
    targetPort: {{ .Values.deployment.targetPort}} #8080
